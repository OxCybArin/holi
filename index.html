<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Bhanupriya ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: 'Poppins', sans-serif;
    text-align: center;
    background: radial-gradient(circle at center, #1a1a2e, #0f0f1a);
    color: white;
}

/* Password Screen */
#passwordScreen {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 10;
}

input {
    padding: 10px;
    border-radius: 20px;
    border: none;
    margin-top: 10px;
    text-align: center;
}

button {
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    background: #ff4081;
    color: white;
    transition: 0.3s;
    margin: 5px;
}

button:hover {
    transform: scale(1.1);
}

.container {
    margin-top: 10%;
    display: none;
    z-index: 2;
    position: relative;
}

h1 {
    font-family: 'Pacifico', cursive;
    font-size: 3rem;
}

/* Powder Splash */
.powder {
    position: absolute;
    border-radius: 50%;
    opacity: 0.9;
    filter: blur(3px);
    animation: fall linear forwards;
}

@keyframes fall {
    from { transform: translateY(-100px) scale(0.8) rotate(0deg); }
    to { transform: translateY(100vh) scale(1.4) rotate(360deg); }
}

/* Hearts */
.heart {
    position: absolute;
    font-size: 20px;
    animation: floatUp 2s ease-out forwards;
}

@keyframes floatUp {
    from { opacity: 1; transform: translateY(0); }
    to { opacity: 0; transform: translateY(-150px); }
}
</style>
</head>

<body>

<div id="passwordScreen">
    <h2>Enter Secret Code 💕</h2>
    <input type="password" id="passwordInput" placeholder="Enter password">
    <button onclick="checkPassword()">Enter</button>
    <p id="error" style="color:red;"></p>
</div>

<div class="container" id="mainContent">
    <h1>Happy Holi Bhanupriya ❤️</h1>
    <p style="width:70%; margin:auto;">
        This Holi, I don’t just want to put colors on your cheeks...
        I want to fill your whole life with love, laughter and forever happiness.
        You are the most beautiful color in my world.
    </p>

    <h2 style="margin-top:40px;">Will you be my forever Holi partner? 💖</h2>

    <div style="margin-top:20px; position:relative; height:120px;">
        <button id="yesBtn" onclick="sayYes()">YES 💕</button>
        <button id="noBtn" style="position:absolute;" onmouseover="moveNo()">NO 🙈</button>
    </div>

    <p id="loveMessage" style="margin-top:20px; font-size:1.3rem;"></p>
</div>

<audio id="bgMusic" loop>
    <source src="holi-music.mp3" type="audio/mp3">
</audio>

<script>
const correctPassword = "bhanu123"; // change if you want

function checkPassword() {
    const input = document.getElementById("passwordInput").value;
    if (input === correctPassword) {
        document.getElementById("passwordScreen").style.display = "none";
        document.getElementById("mainContent").style.display = "block";
        document.getElementById("bgMusic").play();
        startPowder();
    } else {
        document.getElementById("error").innerText = "Wrong password ❤️ Try again!";
    }
}

/* Powder Splash Effect */
function startPowder() {
    setInterval(createPowder, 120);
}

function createPowder() {
    const powder = document.createElement("div");
    powder.classList.add("powder");

    const size = Math.random() * 40 + 20;
    powder.style.width = size + "px";
    powder.style.height = size + "px";

    const colors = ["#ff1744","#ff9100","#ffd600","#00e5ff","#d500f9","#00e676"];
    powder.style.background = colors[Math.floor(Math.random() * colors.length)];

    powder.style.left = Math.random() * window.innerWidth + "px";
    powder.style.animationDuration = (Math.random() * 3 + 3) + "s";

    document.body.appendChild(powder);

    setTimeout(() => powder.remove(), 6000);
}

/* NO Button Escape */
function moveNo() {
    const noBtn = document.getElementById("noBtn");
    const container = noBtn.parentElement;

    const maxX = container.clientWidth - noBtn.clientWidth;
    const maxY = container.clientHeight - noBtn.clientHeight;

    noBtn.style.left = Math.random() * maxX + "px";
    noBtn.style.top = Math.random() * maxY + "px";
}

/* YES Button Effect */
function sayYes() {
    document.getElementById("loveMessage").innerHTML =
        "Yayyyy ❤️ I knew it! Happy Holi my forever color 🎨💕";

    for (let i = 0; i < 20; i++) {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * window.innerWidth + "px";
        heart.style.top = (window.innerHeight - 100) + "px";
        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 2000);
    }
}
</script>

</body>
</html>

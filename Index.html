<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Bhanupriya ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: 'Poppins', sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb, #a6c1ee);
    background-size: 400% 400%;
    animation: gradientMove 8s ease infinite;
    color: white;
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* Password Screen */
#passwordScreen {
    position: absolute;
    width: 100%;
    height: 100vh;
    background: rgba(0,0,0,0.85);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 10;
}

input {
    padding: 10px;
    border-radius: 20px;
    border: none;
    outline: none;
    margin-top: 10px;
    text-align: center;
}

button {
    margin-top: 15px;
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    background: #ff4081;
    color: white;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

/* Main Content */
.container {
    position: relative;
    z-index: 2;
    margin-top: 15%;
    display: none;
}

h1 {
    font-family: 'Pacifico', cursive;
    font-size: 3rem;
}

p {
    width: 70%;
    margin: auto;
    font-size: 1.2rem;
}

/* Falling Color Powder */
.powder {
    position: absolute;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    opacity: 0.7;
    animation: fall linear infinite;
}

@keyframes fall {
    from { transform: translateY(-100px); }
    to { transform: translateY(100vh); }
}
</style>
</head>

<body>

<!-- Password Screen -->
<div id="passwordScreen">
    <h2>Enter Secret Code 💕</h2>
    <input type="password" id="passwordInput" placeholder="Enter password">
    <button onclick="checkPassword()">Enter</button>
    <p id="error" style="color:red;"></p>
</div>

<!-- Main Content -->
<div class="container" id="mainContent">
    <h1>Happy Holi Bhanupriya ❤️</h1>
    <p>
        This Holi, I don’t just want to put colors on your cheeks...
        I want to fill your whole life with love, laughter, and forever happiness.
        You are the sweetest color in my world.
    </p>
</div>

<audio id="bgMusic" loop>
    <source src="holi-music.mp3" type="audio/mp3">
</audio>

<script>
const correctPassword = "BILLITERIMAUSI";

function checkPassword() {
    const input = document.getElementById("passwordInput").value;
    if (input === correctPassword) {
        document.getElementById("passwordScreen").style.display = "none";
        document.getElementById("mainContent").style.display = "block";
        document.getElementById("bgMusic").play();
        startPowder();
    } else {
        document.getElementById("error").innerText = "Wrong password ❤️ Try again!";
    }
}

function startPowder() {
    setInterval(createPowder, 150);
}

function createPowder() {
    const powder = document.createElement("div");
    powder.classList.add("powder");
    powder.style.left = Math.random() * window.innerWidth + "px";
    powder.style.background = `hsl(${Math.random()*360},100%,60%)`;
    powder.style.animationDuration = (Math.random() * 3 + 2) + "s";
    document.body.appendChild(powder);

    setTimeout(() => {
        powder.remove();
    }, 5000);
}
</script>

</body>
</html>
